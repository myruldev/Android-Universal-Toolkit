# --- Configuration File for Android Universal Toolkit (AUT) ---
# Diperbarui: 2026-06-27
# Penulis: myruldev

# API Key OpenRouter untuk AI Technical Assistant (Masukkan API Key Anda di sini)
OPENROUTER_API_KEY=""

# Model default OpenRouter yang digunakan (bisa diubah sesuai keinginan)
# Contoh: google/gemini-flash-1.5, meta-llama/llama-3-8b-instruct:free, mistralai/mistral-7b-instruct:free
AI_MODEL="google/gemini-2.0-flash-exp:free"

# File path untuk backup data aplikasi dan setting
BACKUP_DIR="/sdcard/AUT_Backup"

# Mode debug (true/false) untuk mencetak log detail jika ada error
DEBUG=false
